{% extends "flux/base.html" %}
{% load static %}


{% block content %}


    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card border-0 shadow rounded-3">
                        <div class="card-body p-5">
                            <h2 class="card-title text-center mb-5 fw-light fs-5">Login</h2>
                            
                            <form method="POST">
                                {% csrf_token %}
                                
                                <div class="form-item mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control" required>
                                </div>

                                <div class="form-item mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" name="password" class="form-control" required>
                                </div>

                                <div class="d-grid mt-4">
                                    <button class="btn btn-primary btn-lg rounded-pill text-uppercase" type="submit">
                                        Login
                                    </button>
                                </div>
                                
                                <hr class="my-4">
                                <div class="text-center">
                                    <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up here</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
