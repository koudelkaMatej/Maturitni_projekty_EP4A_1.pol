<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 60%;
            background-color: #1a1a1a;
        }

        th, td {
            padding: 12px;
            border: 1px solid #444;
        }

        th {
            background-color: #222;
        }

        tr:nth-child(even) {
            background-color: #181818;
        }

        tr:hover {
            background-color: #333;
        }

        .empty {
            margin-top: 30px;
            font-size: 18px;
            color: #aaa;
        }

        a {
            color: #00ffcc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Tabulka nejlepších hráčů</h1>

{% if scores and scores|length > 0 %}

<table>
    <tr>
        <th>Rank</th>
        <th>Username</th>
        <th>Best Score</th>
    </tr>

    {% for score in scores %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ score["username"] }}</td>
        <td>{{ score["score"] }}</td>
    </tr>
    {% endfor %}

</table>

{% else %}

<div class="empty">
    Zatím žádná skóre, přihlašte se do hry a dobijte vesmír!
</div>

{% endif %}

<br>
<a href="/aktivniuzivatele">← Back to Home</a>

</body>
</html>
