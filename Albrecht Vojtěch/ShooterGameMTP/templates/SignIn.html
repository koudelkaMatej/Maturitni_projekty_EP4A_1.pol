<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přihlášení - Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background-color: #0e0e0e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #1a1a1a;
            padding: 40px;
            border: 2px solid #4CAF50;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .login-container h1 {
            font-size: 32px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .login-container p {
            margin-bottom: 30px;
            font-size: 16px;
            opacity: 0.8;
        }

        .login-container input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .login-container button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-container button:hover {
            background-color: #45a049;
        }

        .login-container .links {
            margin-top: 20px;
            font-size: 14px;
        }

        .login-container .links a {
            color: #4CAF50;
            text-decoration: none;
            margin: 0 10px;
        }

        .login-container .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Přihlášení</h1>
    <p>Vítejte zpět! Přihlaste se ke své hře.</p>
    <form method="POST" action="{{ url_for('signin') }}">
        <input type="text" name="username" placeholder="Uživatelské jméno" required>
        <input type="password" name="password" placeholder="Heslo" required>
        <button type="submit">Přihlásit</button>
    </form>
    <div class="links">
        <span>Nemáte účet? <a href="{{ url_for('signup') }}">Registrovat se</a></span>
    </div>
</div>

</body>
</html>
