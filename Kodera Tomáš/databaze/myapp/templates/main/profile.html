<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Profile</title>
</head>
<body>

<div class="navbar">
    <img class="logo" src="{% static 'pictures/DDR.png' %}" alt="Logo">
    <div class="nav-links">
        <a href="/">BACK TO MAIN PAGE</a>
    </div>

    <div class="accountbutton">
        <img class="account" src="{% static 'pictures/account.png' %}" alt="account">
        <a class="accounttext">ACCOUNT ▼</a>
        <div class="dropdown-content">
            {% if user.is_authenticated %}
                <a href="/profile/">Profile</a>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/register/">Register</a>
                <a href="/login/">Login</a>
            {% endif %}
        </div>
    </div>
</div>


<div class="content">
    <h1>PROFILE</h1>
    <p>Profil uživatele: {{ user.username }}</p>
    <p>Email: {{ user.email }}</p>
    <p>Score: {{ profile.score }}</p>
</div>

</body>
</html>
