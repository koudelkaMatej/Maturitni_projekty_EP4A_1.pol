<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapomenuté heslo | DRIVE.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/account.css">
    <link rel="stylesheet" href="/assets/css/account-auth.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <span>DRIVE.</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/index.html" class="nav-link">Domů</a></li>
                <li><a href="/Products/index.html" class="nav-link">Produkty</a></li>
                <li><a href="/AboutUs/index.html" class="nav-link">O nás</a></li>
                <li><a href="/index.html#section-newsletter" class="nav-link">Kontakt</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/Account/index.html" class="user-icon" style="color: #27445C; margin-right: 15px; font-size: 1.2rem;" title="Můj účet">
                    <i class="fas fa-user"></i>
                </a>
                <a href="/Products/index.html" class="btn nav-cta">Nakupovat</a>
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                    <div class="mini-cart">
                        <h3>Váš košík</h3>
                        <div class="mini-cart-items"></div>
                        <div class="mini-cart-total">
                            <span>Celkem:</span>
                            <span id="miniCartTotal">0 Kč</span>
                        </div>
                        <a href="/Cart/cart.html" class="btn btn-block">Zobrazit košík</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="account-page">
        <div class="account-container auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon" style="font-size: 2.5rem; color: #27445c; margin-bottom: 1rem;">
                        <i class="fas fa-key"></i>
                    </div>
                    <h2>Obnovení hesla</h2>
                    <p>Zadejte svou emailovou adresu a my vám zašleme instrukce pro obnovení hesla.</p>
                </div>
                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label">Emailová adresa</label>
                        <div style="position: relative;">
                            <input type="email" name="email" class="form-input" placeholder="např. jan.novak@email.cz" required>
                            <i class="fas fa-envelope" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        Odeslat instrukce <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                    </button>
                    <div id="formMessage" class="form-error" style="color: inherit;">
                        <span id="msgText"></span>
                    </div>
                </form>
                <div class="auth-footer">
                    Vzpomněli jste si? <a href="login.html">Přihlásit se</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/cart.js?v=2"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = e.target.email.value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            const msgEl = document.getElementById('formMessage');
            const msgText = document.getElementById('msgText');
            
            btn.innerHTML = 'Odesílám...';
            btn.disabled = true;
            msgEl.style.display = 'none';
            msgEl.className = 'form-error'; // Reset class
            
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    msgEl.className = 'form-success'; // Defined in account-auth.css usually or just style inline
                    msgEl.style.color = '#10B981';
                    msgEl.style.marginTop = '1rem';
                    msgEl.style.textAlign = 'center';
                    msgText.innerHTML = `<i class="fas fa-check-circle"></i> ${data.message}`;
                    msgEl.style.display = 'block';
                    e.target.reset();
                } else {
                    msgEl.style.color = '#EF4444';
                    msgText.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error}`;
                    msgEl.style.display = 'block';
                }
            } catch (e) {
                console.error(e);
                msgEl.style.color = '#EF4444';
                msgText.innerText = 'Chyba připojení k serveru.';
                msgEl.style.display = 'block';
            }
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    </script>
    <script src="/assets/js/dev-mode.js"></script>
</body>
</html>
