<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení | DRIVE.</title>
    <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/account.css">
    <link rel="stylesheet" href="/assets/css/account-auth.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <span>DRIVE.</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/index.html" class="nav-link">Domů</a></li>
                <li><a href="/Products/index.html" class="nav-link">Produkty</a></li>
                <li><a href="/AboutUs/index.html" class="nav-link">O nás</a></li>
                <li><a href="/index.html#section-newsletter" class="nav-link">Kontakt</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/Account/index.html" class="user-icon" style="color: #27445C; margin-right: 15px; font-size: 1.2rem;" title="Můj účet">
                    <i class="fas fa-user"></i>
                </a>
                <a href="/Products/index.html" class="btn nav-cta">Nakupovat</a>
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                    <div class="mini-cart">
                        <h3>Váš košík</h3>
                        <div class="mini-cart-items"></div>
                        <div class="mini-cart-total">
                            <span>Celkem:</span>
                            <span id="miniCartTotal">0 Kč</span>
                        </div>
                        <a href="/Cart/cart.html" class="btn btn-block">Zobrazit košík</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="account-page">
        <div class="account-container auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon" style="font-size: 2.5rem; color: #27445c; margin-bottom: 1rem;">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <h2>Vítejte zpět</h2>
                    <p>Přihlaste se ke svému účtu a pokračujte v nákupu</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Emailová adresa</label>
                        <div style="position: relative;">
                            <input type="email" name="email" class="form-input" placeholder="např. jan.novak@email.cz" required>
                            <i class="fas fa-envelope" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label class="form-label" style="margin-bottom: 0;">Heslo</label>
                            <a href="/Account/forgot-password.html" style="font-size: 0.85rem; color: var(--text-secondary); text-decoration: none;">Zapomněli jste heslo?</a>
                        </div>
                        <div style="position: relative;">
                            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                            <i class="fas fa-lock" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth">
                        Přihlásit se <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                    <div id="loginError" class="form-error">
                        <i class="fas fa-exclamation-circle"></i> <span></span>
                    </div>
                </form>
                <div class="auth-footer">
                    Nemáte ještě účet? <a href="register.html">Zaregistrujte se zdarma</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/cart.js?v=2"></script>
    <script>
        // Check for URL messages
        const urlParams = new URLSearchParams(window.location.search);
        const autoMessage = urlParams.get('message');
        if (autoMessage) {
            const errEl = document.getElementById('loginError');
            if (errEl) {
                errEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> <span>${decodeURIComponent(autoMessage)}</span>`;
                errEl.style.display = 'block';
            }
        }

        // Check if already logged in
        fetch('/api/auth/me').then(res => {
            if (res.ok) window.location.href = '/Account/index.html';
        });

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            btn.textContent = 'Přihlašování...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    // Check for redirect param
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    window.location.href = redirect || '/Account/index.html';
                } else {
                    const err = await res.json();
                    const errEl = document.getElementById('loginError');
                    errEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> <span>${err.error || 'Chyba přihlášení'}</span>`;
                    errEl.style.display = 'block';
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
    <script src="/assets/js/dev-mode.js"></script>
</body>
</html>
