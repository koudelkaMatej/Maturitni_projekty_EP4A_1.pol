<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nové heslo | DRIVE.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/account.css">
    <link rel="stylesheet" href="/assets/css/account-auth.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/index.html" class="logo">
                <span>DRIVE.</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/index.html" class="nav-link">Domů</a></li>
                <li><a href="/Products/index.html" class="nav-link">Produkty</a></li>
                <li><a href="/AboutUs/index.html" class="nav-link">O nás</a></li>
                <li><a href="/index.html#section-newsletter" class="nav-link">Kontakt</a></li>
            </ul>
        </div>
    </nav>

    <div class="account-page">
        <div class="account-container auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon" style="font-size: 2.5rem; color: #27445c; margin-bottom: 1rem;">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h2>Nastavení nového hesla</h2>
                    <p>Zadejte nové heslo pro váš účet.</p>
                </div>
                <form id="resetForm">
                    <input type="hidden" name="token" id="token">
                    
                    <div class="form-group">
                        <label class="form-label">Nové heslo</label>
                        <div style="position: relative;">
                            <input type="password" name="password" class="form-input" placeholder="Minimálně 6 znaků" required minlength="6">
                            <i class="fas fa-lock" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Potvrzení hesla</label>
                        <div style="position: relative;">
                            <input type="password" name="confirmPassword" class="form-input" placeholder="Zadejte heslo znovu" required>
                            <i class="fas fa-check-circle" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        Změnit heslo <i class="fas fa-check" style="margin-left: 8px;"></i>
                    </button>
                    <div id="formMessage" class="form-error" style="color: inherit;">
                        <span id="msgText"></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/cart.js?v=2"></script>
    <script>
        // Get Token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        document.getElementById('token').value = token;

        if (!token) {
            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; text-align:center;">
                    <h1>Neplatný odkaz</h1>
                    <p>Chybí token pro obnovu hesla.</p>
                    <a href="/index.html" class="btn">Zpět na domovskou stránku</a>
                </div>`;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = e.target.password.value;
            const confirmPassword = e.target.confirmPassword.value;
            const token = e.target.token.value;
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            const msgEl = document.getElementById('formMessage');
            const msgText = document.getElementById('msgText');

            if (password !== confirmPassword) {
                msgEl.style.color = '#EF4444';
                msgText.innerHTML = '<i class="fas fa-exclamation-circle"></i> Hesla se neshodují.';
                msgEl.style.display = 'block';
                return;
            }
            
            btn.innerHTML = 'Ukládám...';
            btn.disabled = true;
            msgEl.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    msgEl.style.color = '#10B981';
                    msgText.innerHTML = `<i class="fas fa-check-circle"></i> Heslo bylo úspěšně změněno. Přesměrovávám...`;
                    msgEl.style.display = 'block';
                    e.target.reset();
                    setTimeout(() => {
                        window.location.href = '/Account/login.html';
                    }, 2000);
                } else {
                    msgEl.style.color = '#EF4444';
                    msgText.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error}`;
                    msgEl.style.display = 'block';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                msgEl.style.color = '#EF4444';
                msgText.innerText = 'Chyba připojení k serveru.';
                msgEl.style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
