<body>

            </ul>
            <div class="nav-actions">
                <a href="/Account/index.html" class="user-icon" style="color: #27445C; margin-right: 15px; font-size: 1.2rem;" title="MĹŻj ĂşÄŤet">
                    <i class="fas fa-user"></i>

    <div class="account-page">
        <div class="account-container auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon" style="font-size: 2.5rem; color: #27445c; margin-bottom: 1rem;">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>VytvoĹ™it novĂ˝ ĂşÄŤet</h2>
                    <p>ZĂ­skejte pĹ™Ă­stup k historii objednĂˇvek a rychlejĹˇĂ­mu nĂˇkupu</p>
                </div>
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">JmĂ©no a pĹ™Ă­jmenĂ­</label>
                        <div style="position: relative;">
                            <input type="text" name="name" class="form-input" placeholder="Jan NovĂˇk" required>
                            <i class="fas fa-user" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">EmailovĂˇ adresa</label>
                        <div style="position: relative;">
                            <input type="email" name="email" class="form-input" placeholder="vas@email.cz" required>
                            <i class="fas fa-envelope" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Heslo</label>
                        <div style="position: relative;">
                            <input type="password" name="password" class="form-input" placeholder="MinimĂˇlnÄ› 6 znakĹŻ" required minlength="6">
                            <i class="fas fa-lock" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #aaa;"></i>
                        </div>
                        <div style="font-size: 0.8rem; color: #888; margin-top: 5px; margin-left: 5px;">
                            <i class="fas fa-info-circle"></i> Heslo musĂ­ mĂ­t alespoĹ 6 znakĹŻ
                        </div>
                    </div>
                    <button type="submit" class="btn-auth">
                        VytvoĹ™it ĂşÄŤet <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                    <div id="registerError" class="form-error">
                        <i class="fas fa-exclamation-circle"></i> <span></span>
                    </div>
                </form>
                <div class="auth-footer">
                    JiĹľ mĂˇte ĂşÄŤet? <a href="login.html">PĹ™ihlaste se</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/cart.js?v=2"></script>
    <script>
        // Check if already logged in
        fetch('/api/auth/me').then(res => {
            if (res.ok) window.location.href = '/Account/index.html';
        });

        // Register Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            
            btn.textContent = 'Registrace...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    const userData = await res.json();
                    // Auto-login logic is actually handled by register? No, register just creates user.
                    // But wait, the original code redirected to index directly, implying user might not be logged in immediately?
                    // Actually, typically register logs user in immediately.
                    // Let's check updated server logic. Oh, I didn't add auto-login to register endpoint.
                    // Let's first try to login automatically with the password provided.
                    
                    const loginRes = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: data.email, password: data.password })
                    });
                    
                    if (loginRes.ok) {
                        window.location.href = '/Account/index.html';
                    } else {
                        // Fallback
                        window.location.href = '/Account/login.html';
                    }
                } else {
                    const err = await res.json();
                    const errEl = document.getElementById('registerError');
                    errEl.textContent = err.error || 'Chyba registrace';
                    errEl.style.display = 'block';
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
