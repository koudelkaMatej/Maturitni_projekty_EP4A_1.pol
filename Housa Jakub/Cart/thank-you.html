no<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objednávka přijata | DRIVE.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/cart.css">
</head>
<body>
    <!-- Navbar removed as requested -->

    <main class="container thank-you-page">
        <!-- Progress Steps -->
        <div class="checkout-steps">
            <div class="step completed">
                <div class="step-circle"><i class="fas fa-check"></i></div>
                <div class="step-label">Košík</div>
            </div>
            <div class="step completed">
                <div class="step-circle"><i class="fas fa-check"></i></div>
                <div class="step-label">Doprava a platba</div>
            </div>
            <div class="step completed">
                <div class="step-circle"><i class="fas fa-check"></i></div>
                <div class="step-label">Kontrola</div>
            </div>
        </div>

        <div style="background: white; padding: 3rem; border-radius: 24px; border: 1px solid #e5e7eb; box-shadow: 0 10px 40px rgba(0,0,0,0.04); max-width: 650px; width: 100%; margin-top: 2rem; display: flex; flex-direction: column; align-items: center; text-align: center;">
            <div style="margin-bottom: 1.5rem;">
                <div style="width: 80px; height: 80px; background: #dcfce7; color: #22c55e; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 2.5rem;">
                    <i class="fas fa-check"></i>
                </div>
            </div>
            
            <h1 style="margin-bottom: 1rem; font-size: 2.5rem;">Objednávka dokončena!</h1>
            <p style="font-size: 1.1rem; color: #6b7280; line-height: 1.6; margin-bottom: 2rem; max-width: 500px;">
                Děkujeme za váš nákup. Vaši objednávku jsme úspěšně přijali a začínáme ji zpracovávat. Potvrzení s detaily jsme zaslali na váš email.
            </p>
            
            <div id="orderIdContainer" style="display: none; margin-bottom: 2rem; padding: 1.5rem; background: #f9fafb; border-radius: 12px; border: 1px dashed #d1d5db;">
                <span style="display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.5rem; font-weight: 600;">Číslo objednávky</span>
                <span id="orderIdDisplay" style="font-size: 1.5rem; font-weight: 800; color: #111827; font-family: monospace;"></span>
            </div>

            <a href="/index.html" class="btn" style="min-width: 200px;">Zpět na úvod</a>
        </div>
    </main>

    <!-- Footer removed as requested -->

    <script>
        // Get order ID from URL query param
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        
        if (orderId) {
            document.getElementById('orderIdDisplay').textContent = '#' + orderId;
            document.getElementById('orderIdContainer').style.display = 'block';
        }
    </script>
</body>
</html>
