</head>
<body>
    <header>
        <h1>Snake</h1> 
        <nav>
            <ul>
                <li><a href="O Projektu.html">O Projektu</a></li>
                <li><a href="Diagramy.html">Diagramy</a></li>

                    <button type="button" class="dropdown-toggle">Dokumentace</button>
                    <ul class="dropdown-menu">

                    </ul>
                </li>
                <li><a href="O-hre.html">O hře</a></li>

                <li><a href="Můj účet.html">Můj účet</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-center">
            <form id="loginForm" class="login-card" novalidate>
                <h2>Přihlášení</h2>
                

                <label for="user">Uživatelské jméno nebo e-mail</label>
                <input id="user" name="user" type="text" autocomplete="username" required>

                <label for="password">Heslo</label>
                <div class="pw-wrap">
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                    <button type="button" id="togglePw" class="pw-toggle" aria-label="Zobrazit heslo">👁️</button>
                </div>

                <div class="row">
                    <label class="checkbox"><input type="checkbox" id="remember"> Zapamatovat</label>
                    
                </div>

                <div class="actions">
                    <button id="submitBtn" type="submit" class="primary">Přihlášení</button>
                    <a class="primary" href="Registrace.html">Registrace</a>
                </div>

                <div id="msg" class="msg" aria-live="polite"></div>

            
            </form>
        </div>
    </main>

    <script>
    (function(){
            const form = document.getElementById('loginForm');
            const user = document.getElementById('user');
            const pw = document.getElementById('password');
            const msg = document.getElementById('msg');
            const toggle = document.getElementById('togglePw');
            const API = 'http://localhost:5000/api';

            toggle.addEventListener('click', ()=> {
                pw.type = pw.type === 'password' ? 'text' : 'password';
                toggle.textContent = pw.type === 'password' ? '👁️' : '🙈';
            });

            form.addEventListener('submit', async (e)=> {
                e.preventDefault();
                msg.textContent = '';
                const identifier = user.value.trim();
                const password = pw.value.trim();
                if (!identifier || !password) {
                    msg.textContent = 'Vyplň uživatelské jméno / e-mail i heslo.';
                    msg.style.color = '#ffb3b3';
                    return;
                }
                msg.style.color = '#bff7c6';
                msg.textContent = 'Přihlašuji...';
                try {
                    const res = await fetch(`${API}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        msg.style.color = '#ffb3b3';
                        msg.textContent = data.error || 'Přihlášení selhalo.';
                        return;
                    }
                    localStorage.setItem('snake_token', data.token);
                    localStorage.setItem('snake_user', data.username);
                    msg.style.color = '#bff7c6';
                    msg.textContent = 'Přihlášení úspěšné. Přesměrování...';

                    // Získej základní údaje a přesměruj na Můj účet
                    try {
                        const meRes = await fetch(`${API}/me`, {
                            headers: { 'Authorization': 'Bearer ' + data.token }
                        });
                        if (meRes.ok) {
                            const me = await meRes.json();
                            localStorage.setItem('snake_user', me.username || '');
                        }
                    } catch(_) { /* ignoruj, jen přesměruj */ }

                    location.href = 'Můj účet.html';
                } catch(err){
                    msg.style.color = '#ffb3b3';
                    msg.textContent = 'Chyba připojení k serveru.';
                }
            });
    })();
    </script>
</body>
</html>
